<!doctype html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>오늘의 꿈해몽 | 길몽 흉몽 풀이</title>
<meta name="description" content="오늘 꾼 꿈을 입력하면 길몽인지 흉몽인지, 어떤 의미인지 바로 알려주는 꿈해몽 서비스" />
<style>
  :root {
    --bg1: #1b1035;
    --bg2: #3b1d63;
    --accent: #ffd76a;
    --accent2: #a78bfa;
    --card: rgba(255,255,255,0.06);
    --text: #f4f1ff;
    --muted: #c9c0e8;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    min-height: 100%;
    font-family: "Pretendard", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
    background: radial-gradient(ellipse at top, var(--bg2), var(--bg1) 60%);
    color: var(--text);
  }
  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 16px 80px;
  }
  .stars {
    position: fixed;
    inset: 0;
    pointer-events: none;
    background-image:
      radial-gradient(1px 1px at 20% 30%, #fff, transparent),
      radial-gradient(1px 1px at 70% 60%, #fff, transparent),
      radial-gradient(1.5px 1.5px at 40% 80%, #fff, transparent),
      radial-gradient(1px 1px at 85% 20%, #fff, transparent),
      radial-gradient(1.5px 1.5px at 55% 45%, #fff, transparent),
      radial-gradient(1px 1px at 10% 65%, #fff, transparent);
    background-size: 100% 100%;
    opacity: 0.5;
  }
  header { text-align: center; margin-bottom: 28px; z-index: 1; }
  header .badge {
    display: inline-block;
    font-size: 13px;
    color: var(--accent);
    letter-spacing: 0.15em;
    margin-bottom: 8px;
  }
  h1 { font-size: 28px; margin: 0 0 8px; }
  header p { color: var(--muted); margin: 0; font-size: 14px; }

  main {
    width: 100%;
    max-width: 520px;
    z-index: 1;
  }
  .card {
    background: var(--card);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 20px;
    padding: 24px;
    backdrop-filter: blur(6px);
    box-shadow: 0 20px 60px rgba(0,0,0,0.35);
  }
  label {
    display: block;
    font-size: 14px;
    color: var(--muted);
    margin-bottom: 10px;
  }
  textarea {
    width: 100%;
    min-height: 110px;
    resize: vertical;
    background: rgba(0,0,0,0.25);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 12px;
    padding: 14px;
    color: var(--text);
    font-size: 15px;
    line-height: 1.5;
    outline: none;
  }
  textarea:focus { border-color: var(--accent2); }
  textarea::placeholder { color: #8f86b8; }

  button.submit {
    width: 100%;
    margin-top: 16px;
    padding: 14px;
    border: none;
    border-radius: 12px;
    background: linear-gradient(135deg, var(--accent2), #7c3aed);
    color: #fff;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    transition: transform 0.15s ease, opacity 0.15s ease;
  }
  button.submit:hover { transform: translateY(-1px); opacity: 0.92; }
  button.submit:active { transform: translateY(0); }

  .hint {
    margin-top: 12px;
    font-size: 12px;
    color: #9187b8;
    text-align: center;
  }

  #result {
    margin-top: 20px;
    display: none;
  }
  .result-card {
    border-radius: 20px;
    padding: 24px;
    border: 1px solid rgba(255,255,255,0.12);
    animation: fadeIn 0.4s ease;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .luck-good { background: linear-gradient(145deg, rgba(255,215,106,0.18), rgba(255,255,255,0.05)); }
  .luck-bad { background: linear-gradient(145deg, rgba(255,90,90,0.16), rgba(255,255,255,0.05)); }
  .luck-neutral { background: linear-gradient(145deg, rgba(167,139,250,0.18), rgba(255,255,255,0.05)); }

  .luck-tag {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 6px 14px;
    border-radius: 999px;
    font-size: 13px;
    font-weight: 700;
    margin-bottom: 14px;
  }
  .luck-good .luck-tag { background: var(--accent); color: #402d00; }
  .luck-bad .luck-tag { background: #ff6b6b; color: #400000; }
  .luck-neutral .luck-tag { background: var(--accent2); color: #23124a; }

  .result-card h2 { margin: 0 0 10px; font-size: 20px; }
  .result-card p { margin: 0 0 6px; color: var(--text); font-size: 15px; line-height: 1.6; }
  .keywords { margin-top: 14px; display: flex; flex-wrap: wrap; gap: 6px; }
  .keywords span {
    font-size: 12px;
    padding: 4px 10px;
    border-radius: 999px;
    background: rgba(255,255,255,0.1);
    color: var(--muted);
  }
  .disclaimer {
    margin-top: 14px;
    font-size: 11px;
    color: #9187b8;
    border-top: 1px dashed rgba(255,255,255,0.15);
    padding-top: 10px;
  }

  footer {
    margin-top: 40px;
    font-size: 12px;
    color: #766b9c;
    z-index: 1;
    text-align: center;
  }
</style>
</head>
<body>
  <div class="stars"></div>

  <header>
    <div class="badge">DREAM INTERPRETER</div>
    <h1>🌙 오늘의 꿈해몽</h1>
    <p>오늘 꾼 꿈을 간단히 적어보세요. 길몽인지 흉몽인지 바로 알려드려요.</p>
  </header>

  <main>
    <div class="card">
      <label for="dreamInput">어떤 꿈을 꾸셨나요?</label>
      <textarea id="dreamInput" placeholder="예) 뱀이 나를 쫓아와서 도망가다가 넓은 바다를 봤어요"></textarea>
      <button class="submit" id="submitBtn">꿈해몽 보기</button>
      <div class="hint">키워드를 기반으로 한 참고용 해몽이에요. 재미로만 봐주세요 🙂</div>
    </div>

    <div id="result"></div>
  </main>

  <footer>© 2026 오늘의 꿈해몽</footer>

const FALLBACK = {
  luck: "neutral",
  title: "알 수 없는 꿈",
  text: "아직 사전에 없는 상징의 꿈이네요. 꿈에서 느꼈던 감정(편안함/불안함)이 현재 마음 상태를 더 잘 보여주는 경우가 많아요. 조금 더 구체적인 키워드로 다시 적어보시면 더 정확히 풀이해드릴 수 있어요.",
};

const LUCK_LABEL = {
  good: "✨ 길몽",
  bad: "⚠️ 흉몽",
  neutral: "🌗 평몽",
};

function interpretDream(input) {
  const matched = [];
  for (const entry of DREAM_DICTIONARY) {
    if (entry.keywords.some((k) => input.includes(k))) {
      matched.push(entry);
    }
  }
  if (matched.length === 0) {
    return { ...FALLBACK, matchedKeywords: [] };
  }

  const luckCount = { good: 0, bad: 0, neutral: 0 };
  matched.forEach((m) => luckCount[m.luck]++);
  let overallLuck = "neutral";
  if (luckCount.good > luckCount.bad) overallLuck = "good";
  else if (luckCount.bad > luckCount.good) overallLuck = "bad";

  return {
    luck: overallLuck,
    title: matched.map((m) => m.title).join(" · "),
    text: matched.map((m) => m.text).join(" "),
    matchedKeywords: matched.flatMap((m) => m.keywords).filter((k, i, arr) => arr.indexOf(k) === i),
  };
}

function render(result) {
  const el = document.getElementById("result");
  const keywordsHtml = result.matchedKeywords && result.matchedKeywords.length
    ? `<div class="keywords">${result.matchedKeywords.map((k) => `<span>#${k}</span>`).join("")}</div>`
    : "";
  el.innerHTML = `
    <div class="result-card luck-${result.luck}">
      <div class="luck-tag">${LUCK_LABEL[result.luck]}</div>
      <h2>${result.title}</h2>
      <p>${result.text}</p>
      ${keywordsHtml}
      <div class="disclaimer">본 해몽은 전통적인 꿈 상징 풀이를 참고한 재미용 콘텐츠로, 실제 미래를 예측하지 않아요.</div>
    </div>
  `;
  el.style.display = "block";
  el.scrollIntoView({ behavior: "smooth", block: "nearest" });
}

document.getElementById("submitBtn").addEventListener("click", () => {
  const input = document.getElementById("dreamInput").value.trim();
  if (!input) {
    alert("오늘 꾼 꿈을 입력해주세요!");
    return;
  }
  const result = interpretDream(input);
  render(result);
  logDream(input, result);
});

function logDream(dreamText, result) {
  fetch("/api/log-dream", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ dreamText, luck: result.luck, title: result.title }),
  }).catch(() => {});
}

document.getElementById("dreamInput").addEventListener("keydown", (e) => {
  if (e.key === "Enter" && (e.metaKey || e.ctrlKey)) {
    document.getElementById("submitBtn").click();
  }
});
